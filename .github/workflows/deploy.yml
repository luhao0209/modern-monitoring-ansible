name: Deploy Modern Monitoring Stack

# 触发条件配置
on:
  push:
    branches: [ "main" ]
  # 开启手动网页触发，并定义输入表单
  workflow_dispatch:
    inputs:
      target_ip:
        description: '👉 新服务器的公网 IP'
        required: true
        type: string
      target_password:
        description: '👉 新服务器的 root 密码 (系统会加密掩码)'
        required: true
        type: password

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      # 关键解法：构建纯净的隔离环境，屏蔽 GitHub 预装工具的干扰
      - name: Setup Clean Python Environment
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # 在干净的环境中安装兼容版 Ansible，这次绝对不会被顶替
      - name: Install Compatible Ansible
        run: |
          pip install "ansible==9.5.1"

      - name: Setup SSH Context
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SERVER_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Install sshpass (免密工具)
        run: sudo apt-get update && sudo apt-get install -y sshpass

      - name: Generate Dynamic Inventory (根据网页输入生成配置)
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: |
          echo "[monitoring_servers]" > inventory.ini
          echo "server_1 ansible_host=${{ inputs.target_ip }} ansible_user=root ansible_ssh_pass=${{ inputs.target_password }}" >> inventory.ini

      - name: Run Ansible Playbook
        run: |
          ansible-playbook -i inventory.ini playbook.yml
          
      - name: Install dependencies
        run: sudo apt-get install -y sshpass
        
